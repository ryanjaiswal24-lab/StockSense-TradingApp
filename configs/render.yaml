services:
  - type: web
    name: stocksense-combined-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/main.py
    envVars:
      - key: FIREBASE_DATABASE_URL
        value: https://stockscene-560d7-default-rtdb.asia-southeast1.firebasedatabase.app
      - key: GROQ_API_KEY
        sync: false
